# SF house-hunting search configuration.
# Craigslist's nh= neighborhood codes are unreliable, so the fetcher runs one
# citywide pass per room_type (price + bedrooms ARE honored server-side) and then
# buckets results into target areas by matching the listing's location text.

max_price: 2000          # hard cap, $/month
min_bathrooms: 1

# Target areas, ordered by the user's preference. `weight` feeds the fit score
# (10 = ideal). `match` = lowercase substrings tested against each listing's
# Craigslist location text; first area whose substring matches wins.
areas:
  - name: "Inner Richmond"          # user's favourite
    weight: 10
    match: ["inner richmond"]
  - name: "Inner Sunset / UCSF"
    weight: 10
    match: ["inner sunset", "ucsf"]
  - name: "West Portal / Forest Hill"
    weight: 8
    match: ["west portal", "forest hill"]
  - name: "Sunset / Parkside"
    weight: 8
    match: ["sunset / parkside", "parkside", "outer sunset", "sunset blvd", "the sunset"]
  - name: "Noe Valley"
    weight: 7
    match: ["noe valley"]
  - name: "Marina / Cow Hollow"
    weight: 7
    match: ["marina", "cow hollow"]
  - name: "Outer Richmond / Seacliff"
    weight: 7
    match: ["richmond / seacliff", "seacliff", "outer richmond"]
  - name: "Glen Park"
    weight: 6
    match: ["glen park"]
  - name: "Cole Valley / Ashbury Hts"
    weight: 6
    match: ["cole valley", "ashbury"]
  - name: "Laurel Hts / Presidio"
    weight: 6
    match: ["laurel", "presidio"]

# Listings with a vague but plausibly-SF location ("san francisco", "city of san
# francisco") are kept for vetting under this bucket; named non-target hoods
# (nob hill, tenderloin, ingleside, etc.) and other cities are dropped.
include_unspecified_sf: true
unspecified_area_name: "(unspecified SF)"

# --------------------------------------------------------------------------
# GEO MODEL — used by scripts/geo.py to classify every listing by COORDINATES
# (the area text is often missing/wrong) into an area tier. This drives ranking:
# `favorite` areas (flagged `favorite: true` below) float to the TOP, sorted by
# match within; everything else ranks by match below them; `avoid` areas are
# heavily punished (sunk below everything, badged, and excluded from Featured +
# Telegram alerts). (proximity_km is still computed/stored but no longer orders.)
geo:
  # Workplace: Transamerica Pyramid (Financial District).
  work: { name: "Transamerica Pyramid", lat: 37.7952, lng: -122.4028 }

  # Areas to AVOID living in — Tenderloin and everything adjacent/rough/unsafe,
  # plus dense non-residential cores. A listing whose coords fall within
  # radius_km of any of these is tier 'avoid' (even a few "ok" TL blocks: the
  # user prefers to avoid the whole area).
  avoid_zones:
    - { name: "Tenderloin",                 lat: 37.7836, lng: -122.4135, radius_km: 0.85 }
    - { name: "Civic Center / Mid-Market",  lat: 37.7793, lng: -122.4172, radius_km: 0.70 }
    - { name: "SoMa",                       lat: 37.7785, lng: -122.4050, radius_km: 1.00 }
    - { name: "Union Square / Downtown",    lat: 37.7880, lng: -122.4070, radius_km: 0.45 }
    - { name: "Financial District core",    lat: 37.7950, lng: -122.4010, radius_km: 0.55 }
    - { name: "Nob Hill / Lower Nob Hill",  lat: 37.7905, lng: -122.4150, radius_km: 0.60 }
    - { name: "Chinatown",                  lat: 37.7941, lng: -122.4078, radius_km: 0.35 }
    - { name: "Bayview / Hunters Point",    lat: 37.7299, lng: -122.3890, radius_km: 1.80 }
    - { name: "Visitacion Valley",          lat: 37.7155, lng: -122.4050, radius_km: 1.20 }

  # Preferred residential areas (calm, safe, parks or beach nearby). Each has a
  # rough centroid; a listing within match_radius_km of one is tier 'preferred'.
  # Entries marked `favorite: true` are the user's top picks (Inner Richmond,
  # Inner Sunset, the Sunset/Parkside, Presidio Heights/Laurel) — tier 'favorite',
  # which floats them above everything else in the index, Featured, and alerts.
  # `transit_bonus_km` shrinks the effective distance for areas with fast rail to
  # downtown (BART/Metro to Montgomery), so e.g. Glen Park ranks near despite the
  # miles. Everything else in SF (not avoid, not preferred) is tier 'acceptable'.
  preferred_match_radius_km: 1.8
  preferred:
    - { name: "North Beach / Telegraph Hill", lat: 37.8005, lng: -122.4100 }
    - { name: "Russian Hill",                 lat: 37.8010, lng: -122.4180 }
    - { name: "Marina / Cow Hollow",          lat: 37.8005, lng: -122.4360 }
    - { name: "Pacific Heights",              lat: 37.7925, lng: -122.4380 }
    - { name: "Presidio Heights / Laurel Hts", lat: 37.7880, lng: -122.4470, favorite: true }
    - { name: "Potrero Hill",                 lat: 37.7580, lng: -122.4005 }
    - { name: "Noe Valley",                   lat: 37.7510, lng: -122.4330 }
    - { name: "Cole Valley / Ashbury Hts",    lat: 37.7660, lng: -122.4480 }
    - { name: "Glen Park",                    lat: 37.7340, lng: -122.4340, transit_bonus_km: 3.0 }
    - { name: "Bernal Heights",               lat: 37.7390, lng: -122.4150 }
    - { name: "Inner Richmond",               lat: 37.7800, lng: -122.4640, favorite: true }
    - { name: "Inner Sunset / UCSF",          lat: 37.7630, lng: -122.4660, favorite: true }
    - { name: "West Portal / Forest Hill",    lat: 37.7400, lng: -122.4660, transit_bonus_km: 2.5 }
    - { name: "Outer Richmond / Seacliff",    lat: 37.7785, lng: -122.4880 }
    - { name: "Sunset / Parkside",            lat: 37.7480, lng: -122.4940, favorite: true }

# PULL PHILOSOPHY: pull broadly (almost all of SF, price-capped, no office/parking),
# then let SUBAGENTS manually read each post and filter rooms / tag scams / judge
# fit. We do NOT script-filter rooms or scams — only two objective, no-false-
# positive mechanical gates remain (no-photos, and outside-SF by coordinates).
#
# One broad pass: hhh + max_price + excats (server-side excludes office/parking).
# Then a category BLOCK-list by post-URL code removes non-rental categories.
excats: "40-1"                       # craigslist: exclude office/commercial + parking
blocked_categories: ["off", "rea", "reb", "vac", "swp", "prk", "park", "fee"]

# Room-type passes. Studio = 0 bedrooms, 1BR = 1 bedroom. 1BR and whole 2+ bed
# units are BOTH top priority; spacious studio is the fallback. (2+ beds get
# EXTRA scam scrutiny — a whole multi-bed home <=$2k is classic scam bait.)
room_types:
  - key: "1br"
    label: "1 bed / 1 bath"
    min_bedrooms: 1
    max_bedrooms: 1
    priority: 1            # top priority
  - key: "2br_plus"
    label: "2+ bed (whole unit)"
    min_bedrooms: 2
    max_bedrooms: 4
    priority: 1            # top priority too (whole units only; scrutinize harder)
  - key: "studio"
    label: "Studio"
    min_bedrooms: 0
    max_bedrooms: 0
    priority: 2            # acceptable fallback (spacious only)

# A spacious studio needs at least this many sqft to score well (smaller = penalised).
min_studio_sqft: 450

# Telegram notification gate. Only 🟢/🟡 (non-scam) posts clearing BOTH are pinged.
notify:
  min_legit_score: 70
  min_fit_score: 60

# Politeness when scraping Craigslist.
scrape:
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
  page_size: 120          # craigslist returns 120 results per page
  delay_seconds: 2.0      # pause between requests
  max_pages_per_pass: 10  # safety cap (1200 results/pass is far more than exists)
