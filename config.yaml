# SF house-hunting search configuration.
# Craigslist's nh= neighborhood codes are unreliable, so the fetcher runs one
# citywide pass per room_type (price + bedrooms ARE honored server-side) and then
# buckets results into target areas by matching the listing's location text.

max_price: 2000          # hard cap, $/month
min_bathrooms: 1

# Target areas — used only to LABEL listings during discovery
# (fetch_listings.assign_area) and to order the vetting batches (tools/batches.py).
# `weight` NO LONGER affects ranking: every SF area is now a level field ranked by
# match; only UNSAFE areas (see `unsafe:` below) are deprioritized. `match` =
# lowercase substrings tested against each listing's Craigslist location text.
areas:
  - name: "Inner Richmond"
    weight: 10
    match: ["inner richmond"]
  - name: "Inner Sunset / UCSF"
    weight: 10
    match: ["inner sunset", "ucsf"]
  - name: "West Portal / Forest Hill"
    weight: 8
    match: ["west portal", "forest hill"]
  - name: "Sunset / Parkside"
    weight: 8
    match: ["sunset / parkside", "parkside", "outer sunset", "sunset blvd", "the sunset"]
  - name: "Noe Valley"
    weight: 7
    match: ["noe valley"]
  - name: "Marina / Cow Hollow"
    weight: 7
    match: ["marina", "cow hollow"]
  - name: "Outer Richmond / Seacliff"
    weight: 7
    match: ["richmond / seacliff", "seacliff", "outer richmond"]
  - name: "Glen Park"
    weight: 6
    match: ["glen park"]
  - name: "Cole Valley / Ashbury Hts"
    weight: 6
    match: ["cole valley", "ashbury"]
  - name: "Laurel Hts / Presidio"
    weight: 6
    match: ["laurel", "presidio"]

# Listings with a vague but plausibly-SF location ("san francisco", "city of san
# francisco") are kept for vetting under this bucket; named non-target hoods
# (nob hill, tenderloin, ingleside, etc.) and other cities are dropped.
include_unspecified_sf: true
unspecified_area_name: "(unspecified SF)"

# --------------------------------------------------------------------------
# AREA MODEL (scripts/geo.py) — FLAT: every SF area is a level field ranked by
# match; only UNSAFE areas are deprioritized (sunk to the bottom, badged "unsafe
# area", and excluded from Featured + Telegram alerts). There is no favorite/
# preferred weighting and no proximity-to-work ordering.
#
# A listing's area comes from its ACTUAL location: when the post gives a street
# address, fetch_detail.py geocodes it to PRECISE coords + a neighbourhood name;
# otherwise we use the post's area text. A listing is UNSAFE if its neighbourhood
# NAME matches `names` below, OR its coords fall inside a `zones` radius (a
# coordinate backstop — the name match is the primary signal and fixes imprecise
# map pins, e.g. a "heart of Nob Hill" post whose pin lands just outside a zone).
unsafe:
  # Neighbourhood-name substrings (lowercase) tested against the geocoded place
  # name and the post's area text. Refined from 2023-25 sources (SFPD/DataSF
  # crime data, Mission Local / SF Standard reporting, r/AskSF + r/sanfrancisco,
  # neighborhood guides). NOTE: SF crime hit a 23-year low in 2024 (auto break-ins
  # -54%, violent -14%) — risk is now geographically CONCENTRATED, mostly property
  # crime + open-air drug markets, so the unsafe set is deliberately tight.
  names:
    - tenderloin
    - tendernob           # Tenderloin-adjacent SE edge of Nob Hill (NOT the hill proper)
    - lower nob hill      # kept avoid (user call) — Nob Hill crest itself is safe
    - mid-market
    - mid market
    - civic center
    - united nations plaza
    - un plaza
    - union square        # dead at night + high property crime, not a peaceful/parks fit
    - downtown
    - chinatown           # kept avoid (user call) — only SF nhood where violent crime ROSE in 2025 (+39%)
    - bayview
    - hunters point
    - hunter's point
    - sunnydale           # public-housing complex in Visitacion Valley, historically high crime
  # Moved to the `caution:` tier (surfaced-but-discounted, NOT avoided) per 2024-26
  # research: polk gulch (upper Polk is fine), financial district / fidi (low resident
  # violence), soma / south of market (eastern waterfront is residential), visitacion
  # valley (only the Sunnydale complex is dangerous).
  # Deliberately NOT flagged (sources say the blanket label is unfair): the
  # broader MISSION (recorded crime down in 2025; west-of-Valencia is prime
  # young-life — only the 16th & Mission BART plaza is a micro-hotspot, too small
  # to gate a whole listing on), WESTERN ADDITION (block-by-block; flagging would
  # wrongly sink desirable NOPA / Alamo Square), and NOB HILL proper.

  # Coordinate backstop: a listing whose coords fall within radius_km of any of
  # these is unsafe even if the name didn't match. (The Tenderloin zone reaches
  # north over Lower Nob Hill / Tendernob, so there is no separate Nob Hill zone —
  # the safe hill crest stays 'ok'.)
  zones:
    - { name: "Tenderloin",                 lat: 37.7836, lng: -122.4135, radius_km: 0.85 }  # reaches over lower Polk + lower Tendernob
    - { name: "Civic Center / Mid-Market",  lat: 37.7793, lng: -122.4172, radius_km: 0.70 }
    - { name: "SoMa 6th-St / West core",    lat: 37.7800, lng: -122.4085, radius_km: 0.60 }  # tightened: frees the eastern waterfront
    - { name: "Union Square / Downtown",    lat: 37.7880, lng: -122.4070, radius_km: 0.45 }
    - { name: "Chinatown",                  lat: 37.7941, lng: -122.4078, radius_km: 0.35 }
    - { name: "Bayview / Hunters Point",    lat: 37.7299, lng: -122.3890, radius_km: 1.80 }
    - { name: "Sunnydale",                  lat: 37.7120, lng: -122.4118, radius_km: 0.60 }  # tightened: only the projects, not all of Vis Valley
  # (Financial District core zone removed — FiDi is now `caution`, not avoid.)

# Second-tier ("okay, but not prime") areas — formerly avoided, but 2024-26 research
# (SFPD/DataSF, Mission Local / SF Standard, r/AskSF) shows they're safe-enough to
# SURFACE, just not as good as prime residential SF. They are KEPT + shown, but their
# MATCH is discounted (geo.MATCH_FACTOR['caution']=0.7) and they rank as a GROUP below
# every 'ok' area. AVOID always wins over caution (e.g. lower Polk falls in the
# Tenderloin zone -> avoid; only upper Polk reads caution). Same name+zone mechanics
# as `unsafe:` above.
caution:
  names:
    - polk gulch          # upper Polk (Russian Hill side); lower Polk -> Tenderloin zone = avoid
    - financial district  # daytime property crime, low RESIDENT violence; just dead at night
    - fidi
    - jackson square      # quiet, low-disorder north FiDi
    - south of market     # generic SoMa: surfaced-but-discounted; the 6th-St core zone stays avoid
    - soma
    - rincon hill         # eastern SoMa waterfront — residential high-rises, safe-ish
    - south beach
    - east cut
    - visitacion valley   # residential remainder; the Sunnydale complex zone stays avoid
  zones:
    - { name: "Financial District / Jackson Sq", lat: 37.7950, lng: -122.4010, radius_km: 0.50 }
    - { name: "Eastern SoMa waterfront",         lat: 37.7855, lng: -122.3925, radius_km: 0.75 }
    - { name: "Visitacion Valley (residential)", lat: 37.7135, lng: -122.4040, radius_km: 0.55 }

# Berkeley / East Bay crime model — coordinate ZONES, the same approach as SF (NOT a
# BART-distance proxy). Encoded from the NeighborhoodScout Berkeley crime map +
# Berkeley PD geography: the west + south flats run higher-crime; the hills, North
# Berkeley, Northside, Elmwood, Westbrae and Albany are safe. Oakland (south of the
# city line, ~37.846) is excluded per the user (handled in geo.py). BART proximity is
# a FIT/convenience signal (geo.nearest_bart) — it is NOT a safety gate anymore.
berkeley:
  unsafe_zones:
    - { name: "South Berkeley flats (Ashby/Adeline/Sacramento)", lat: 37.8500, lng: -122.2720, radius_km: 0.90 }
  caution_zones:
    - { name: "West Berkeley (San Pablo corridor)",  lat: 37.8680, lng: -122.2950, radius_km: 0.80 }
    - { name: "People's Park / lower Telegraph",     lat: 37.8655, lng: -122.2590, radius_km: 0.35 }

# PULL PHILOSOPHY: pull broadly (almost all of SF, price-capped, no office/parking),
# then let SUBAGENTS manually read each post and filter rooms / tag scams / judge
# fit. We do NOT script-filter rooms or scams — only two objective, no-false-
# positive mechanical gates remain (no-photos, and outside-SF by coordinates).
#
# One broad pass: hhh + max_price + excats (server-side excludes office/parking).
# Then a category BLOCK-list by post-URL code removes non-rental categories.
excats: "40-1"                       # craigslist: exclude office/commercial + parking
blocked_categories: ["off", "rea", "reb", "vac", "swp", "prk", "park", "fee"]

# Room-type passes. Studio = 0 bedrooms, 1BR = 1 bedroom. 1BR and whole 2+ bed
# units are BOTH top priority; spacious studio is the fallback. (2+ beds get
# EXTRA scam scrutiny — a whole multi-bed home <=$2k is classic scam bait.)
room_types:
  - key: "1br"
    label: "1 bed / 1 bath"
    min_bedrooms: 1
    max_bedrooms: 1
    priority: 1            # top priority
  - key: "2br_plus"
    label: "2+ bed (whole unit)"
    min_bedrooms: 2
    max_bedrooms: 4
    priority: 1            # top priority too (whole units only; scrutinize harder)
  - key: "studio"
    label: "Studio"
    min_bedrooms: 0
    max_bedrooms: 0
    priority: 2            # acceptable fallback (spacious only)

# A spacious studio needs at least this many sqft to score well (smaller = penalised).
min_studio_sqft: 450

# Telegram notification gate. Only 🟢/🟡 (non-scam) posts clearing BOTH are pinged.
notify:
  min_legit_score: 70
  min_fit_score: 60

# Politeness when scraping Craigslist.
scrape:
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
  page_size: 120          # craigslist returns 120 results per page
  delay_seconds: 2.0      # pause between requests
  max_pages_per_pass: 10  # safety cap (1200 results/pass is far more than exists)
